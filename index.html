<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Roots</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<div class="container">

<h2>Regal Roots</h2>

<input type="text" id="name" placeholder="Enter Your Name" required>

<input type="tel" id="phone" placeholder="Enter Your Phone Number" required>

<button onclick="sendMessage()">Continue to WhatsApp</button>

</div>

<script>

function sendMessage(){

var name = document.getElementById("name").value;
var phone = document.getElementById("phone").value;

var message = `Hii ${name}!!

Hope you had a great experience purchasing our products.

We are excited to inform you that we have launched our Indian brand *Regal Roots* 🇮🇳

Please take a moment to explore our latest collection of premium novelty products.

Our prices are even lower compared to international brands because we avoid heavy import taxes.

Visit our website here:
https://www.regalroots.in

We would love to hear your feedback!`;

var url = "https://wa.me/"91+phone+"?text="+encodeURIComponent(message);

window.open(url,'_blank');

}

</script>

</body>
</html>
