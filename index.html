<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Roots</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

.input-group{
display:flex;
}

.country{
padding:10px;
background:#eee;
border:1px solid #ddd;
border-right:none;
border-radius:5px 0 0 5px;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:0 5px 5px 0;
}

.name{
width:100%;
border-radius:5px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#25D366;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<div class="container">

<h2>Regal Roots</h2>

<input class="name" type="text" id="name" placeholder="Enter Your Name">

<div class="input-group">
<div class="country">+91</div>
<input type="tel" id="phone" placeholder="Enter Mobile Number">
</div>

<button onclick="sendMessage()">Continue to WhatsApp</button>

</div>

<script>

function sendMessage(){

var name = document.getElementById("name").value;
var phone = document.getElementById("phone").value;

var message = `Hi ${name}!!

Hope you had a great experience purchasing our products.

We’re excited to introduce our Indian brand *Regal Roots* 🇮🇳

Discover our latest high-quality novelty products at affordable prices.

Visit now:
https://www.regalroots.in

We’d love to hear your feedback!`;

var url = "https://wa.me/91"+phone+"?text="+encodeURIComponent(message);

window.open(url,'_blank');

}

</script>

</body>
</html>
